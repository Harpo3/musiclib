# ============================================================
# MusicLib Tag Schema
# ============================================================
# Defines which ID3v2 frames are permitted during tag rebuild
# and normalization, and which tier each frame belongs to.
#
# THREE-TIER MODEL
# ----------------
# Every frame in a file falls into exactly one tier:
#
#   [db_written]     — Value comes from the musiclib database.
#                      Written fresh on every rebuild. Entries
#                      here carry a db_column comment showing
#                      the source column for reference.
#
#   [file_preserved] — Value is read from the file before the
#                      strip step, then written back unchanged.
#                      musiclib does not modify these.
#
#   (dropped)        — Everything else. Frames not listed in
#                      either section are silently removed
#                      during rebuild and normalization.
#
# ENTRY FORMAT
# ------------
# Two naming conventions are used:
#
#   UnifiedName         kid3 unified name — format-agnostic
#                       label that kid3 maps to the correct
#                       frame code per format (ID3v2, MP4,
#                       Vorbis, etc.). Use these for standard
#                       frames. kid3-cli accepts them directly
#                       as "set UnifiedName value" arguments,
#                       so no translation layer is needed.
#
#   !TXXX_DESCRIPTION   Explicit TXXX user-defined text frame.
#                       The "!" prefix (kid3 convention) means
#                       "treat as a literal name, not a unified
#                       lookup". Anything after "!" that does
#                       NOT match [A-Z][A-Z0-9]{3} is treated
#                       as a TXXX description by load_tag_schema().
#
#   !XXXX               Raw ID3v2 frame code (4 uppercase chars
#                       matching [A-Z][A-Z0-9]{3}). Also uses
#                       the "!" prefix but is added to the frame
#                       code set rather than the TXXX set.
#                       Example: !RVA2 (Relative Volume Adjustment).
#
# [db_written] entries use key = value syntax; value is the
# musiclib DB column name (informational comment only — the
# parser ignores it).
#
# [file_preserved] entries are bare names (no "= value").
#
# CUSTOMIZATION
# -------------
# To add a new DB-sourced TXXX field:
#   1. Add it to [db_written] as "!MY_FIELD = my_db_column"
#   2. It will automatically appear in kid3's CustomFrames GUI
#      list after sync_external_tool_config() next runs.
#
# To preserve a vendor TXXX frame without DB involvement:
#   1. Add it to [file_preserved] as "!VENDOR_FRAME"
#   2. It will be read back from the file on every rebuild.
#
# ============================================================


# ------------------------------------------------------------
# [db_written]
# Frames whose values are supplied by the musiclib database.
# These are always allowed and always written fresh on rebuild.
# TXXX entries here (prefixed "!") are also used by
# sync_external_tool_config() to populate kid3's CustomFrames
# setting so they appear as named fields in the kid3 GUI.
# ------------------------------------------------------------
[db_written]
Title               = title
Artist              = artist
Album               = album
Album Artist        = albumartist
Genre               = genre
Rating              = rating           # unified name → POPM
Work                = grouping         # unified name → TIT1 (Content Group Description)
                                       # NOTE: do NOT use "Grouping" here — that maps to
                                       # GRP1 (iTunes Grouping), which is a different frame.
!Songs-DB_Custom1   = lastplayed       # explicit TXXX description; holds last-played timestamp
!Songs-DB_Custom2   = custom2          # explicit TXXX description; reserved for future DB use


# ------------------------------------------------------------
# [file_preserved]
# Frames read from the file before the strip step and written
# back unchanged. musiclib does not source values for these
# from the database. Dropping any of these would cause
# irreversible data loss (e.g. ReplayGain, artwork, ISRC).
# ------------------------------------------------------------
[file_preserved]
Track Number                           # unified name → TRCK
Disc Number                            # unified name → TPOS
Date                                   # unified name → TYER / TDRC (4-digit year)
BPM                                    # unified name → TBPM
Comment                                # unified name → COMM
Lyrics                                 # unified name → USLT
Picture                                # unified name → APIC (album art)
ISRC                                   # unified name → TSRC

!CATALOGNUMBER                         # explicit TXXX description (catalog/release number)
                                       # NOTE: CATALOGNUMBER is file-preserved (not DB-written),
                                       # but it still appears in kid3's CustomFrames because
                                       # sync_external_tool_config() includes all TXXX entries
                                       # from both tiers (excluding REPLAYGAIN*) in the
                                       # custom_frames_list passed to kid3.

!REPLAYGAIN_TRACK_GAIN                 # explicit TXXX description — ReplayGain track level
!REPLAYGAIN_TRACK_PEAK                 # explicit TXXX description — ReplayGain track peak
!REPLAYGAIN_ALBUM_GAIN                 # explicit TXXX description — ReplayGain album level
!REPLAYGAIN_ALBUM_PEAK                 # explicit TXXX description — ReplayGain album peak
                                       # The four REPLAYGAIN* entries above are excluded from
                                       # kid3's CustomFrames list (handled by ReplayGain tools,
                                       # not kid3). sync_external_tool_config() filters them out
                                       # when building custom_frames_list.

!RVA2                                  # raw ID3v2 frame code (Relative Volume Adjustment v2)
                                       # NOTE: RVA2 matches [A-Z][A-Z0-9]{3} so load_tag_schema()
                                       # adds it to SCHEMA_FRAMES_ALLOWED as a frame code, NOT
                                       # to the TXXX sets. It is NOT a TXXX description despite
                                       # using the "!" prefix.

!MusicMatch_Mood                       # legacy vendor TXXX from MusicMatch Jukebox-ripped files
                                       # NOTE: the unified name "Mood" maps to TMOO (ID3v2.4),
                                       # which is a different frame. Preserve this as an explicit
                                       # TXXX description so legacy files are not stripped.
                                       # Treat as read-only — musiclib never writes this field.
